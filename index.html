<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tecno Bombas · Registro de Tanques</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root{--azul-900:#0d2a5c;--azul-700:#1d4ed8;--azul-500:#3b7ddb;--azul-200:#cfe1f7;--azul-50:#f3f8fd;--blanco:#ffffff;--gris-texto:#3a4658;--rojo:#c0392b;--verde:#1f8a4c;--radius:14px;--shadow:0 4px 18px rgba(13,42,92,0.10);}
  *{box-sizing:border-box;} body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(180deg,var(--azul-50) 0%,#eaf2fb 100%);color:var(--gris-texto);min-height:100vh;}
  .logo-img-top{width:38px;height:38px;object-fit:contain;background:white;border-radius:50%;padding:2px;flex-shrink:0;}
  .logo-img-auth{width:110px;height:110px;object-fit:contain;margin:0 auto 10px;display:block;}
  .topbar{background:linear-gradient(135deg,var(--azul-900),var(--azul-700));color:white;padding:14px 20px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);position:sticky;top:0;z-index:50;}
  .topbar h1{font-size:17px;margin:0;font-weight:700;letter-spacing:0.3px;} .topbar .sub{font-size:11px;opacity:0.85;letter-spacing:1.5px;margin-top:1px;}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:13px;}
  .topbar button.logout{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.4);color:white;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;}
  .container{max-width:680px;margin:0 auto;padding:20px 16px 60px;}
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .auth-card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);padding:36px 30px;width:100%;max-width:380px;text-align:center;}
  .auth-card h2{color:var(--azul-900);font-size:20px;margin:6px 0 2px;font-weight:800;}
  .auth-card .tagline{font-size:11px;color:var(--azul-500);letter-spacing:1.5px;margin-bottom:24px;font-weight:600;}
  .field{margin-bottom:14px;text-align:left;} .field label{display:block;font-size:12px;font-weight:600;color:var(--azul-900);margin-bottom:5px;}
  .field input, .field select, .field textarea{width:100%;padding:11px 13px;border:1.5px solid var(--azul-200);border-radius:10px;font-size:14px;color:var(--gris-texto);background:white;font-family:inherit;}
  .field input:focus, .field textarea:focus{outline:none;border-color:var(--azul-700);}
  .row-niveles{display:grid;grid-template-columns:80px 1fr;gap:12px;margin-bottom:12px;}
  .btn-primary{width:100%;background:var(--azul-700);color:white;border:none;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;}
  .btn-primary:disabled{background:#9fb6d8;cursor:not-allowed;} .btn-cancelar{width:100%;background:#e0e7ff;color:var(--azul-900);border:none;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px;}
  .auth-error{background:#fdecea;color:var(--rojo);border-radius:8px;padding:9px 12px;font-size:12.5px;margin-bottom:14px;}
  .tabs{display:flex;gap:8px;margin-bottom:18px;background:white;border-radius:12px;padding:5px;box-shadow:var(--shadow);}
  .tabs button{flex:1;padding:10px;border:none;background:transparent;border-radius:9px;font-size:13px;font-weight:700;color:var(--azul-500);cursor:pointer;}
  .tabs button.active{background:var(--azul-700);color:white;}
  .card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:18px;}
  .card h3{color:var(--azul-900);font-size:15px;margin:0 0 16px;font-weight:800;display:flex;align-items:center;gap:8px;}
  .dir-row{display:flex;gap:8px;align-items:flex-start;} .dir-row .field{flex:1;margin-bottom:0;}
  .map-btn{margin-top:21px;background:var(--azul-50);border:1.5px solid var(--azul-200);color:var(--azul-700);width:42px;height:42px;border-radius:10px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .edif-suggestions{position:relative;} .suggestion-list{position:absolute;top:100%;left:0;right:0;background:white;border:1.5px solid var(--azul-200);border-radius:10px;margin-top:4px;max-height:160px;overflow-y:auto;z-index:20;box-shadow:var(--shadow);}
  .suggestion-item{padding:10px 13px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--azul-50);} .suggestion-item .s-dir{font-size:11px;color:#8095b5;}
  .photo-input-area{border:2px dashed var(--azul-200);border-radius:10px;padding:18px;text-align:center;cursor:pointer;color:var(--azul-500);font-size:13px;font-weight:600;}
  .photo-previews{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;} .photo-thumb{position:relative;width:70px;height:70px;border-radius:8px;overflow:hidden;border:1.5px solid var(--azul-200);}
  .photo-thumb img{width:100%;height:100%;object-fit:cover;} .photo-thumb .remove{position:absolute;top:2px;right:2px;background:rgba(192,57,43,0.9);color:white;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;}
  .submit-msg{font-size:13px;padding:10px 12px;border-radius:8px;margin-top:10px;} .submit-msg.ok{background:#e9f7ef;color:var(--verde);} .submit-msg.err{background:#fdecea;color:var(--rojo);}
  .search-box{margin-bottom:14px;position:relative;} .search-box input{width:100%;padding:12px 14px 12px 36px;border:1.5px solid var(--azul-200);border-radius:10px;font-size:14px;box-shadow:var(--shadow);} .search-box span{position:absolute;left:12px;top:13px;font-size:14px;}
  .historial-item{border-left:4px solid var(--azul-700);background:var(--azul-50);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:12px;}
  .historial-item .h-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;} .historial-item .h-edif{font-weight:800;color:var(--azul-900);font-size:14.5px;}
  .historial-item .h-dir{font-size:12px;color:var(--azul-500);text-decoration:underline;cursor:pointer;margin-top:2px;} .historial-item .h-fecha{font-size:11px;color:#8095b5;white-space:nowrap;}
  .historial-item .h-litros{display:flex;flex-direction:column;gap:4px;margin-top:10px;font-size:13px;} .historial-item .h-litros b{color:var(--azul-900);}
  .historial-item .h-op{font-size:12px;color:var(--gris-texto);margin-top:6px;} .historial-item .h-obs{font-size:12.5px;margin-top:6px;font-style:italic;color:var(--gris-texto);}
  .historial-item .h-fotos{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;} .historial-item .h-fotos img{width:60px;height:60px;object-fit:cover;border-radius:6px;cursor:pointer;border:1.5px solid var(--azul-200);}
  .h-actions{display:flex;gap:8px;margin-top:14px;border-top:1px solid var(--azul-200);padding-top:12px;} .h-actions button{flex:1;padding:8px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;}
  .btn-pdf{background:#1d4ed8;color:white;} .btn-edit{background:#e0e7ff;color:#1d4ed8;} .btn-delete{background:#fdecea;color:#c0392b;}
  .empty-state{text-align:center;color:#8095b5;font-size:13px;padding:30px 10px;} .loading{text-align:center;color:var(--azul-500);font-size:13px;padding:20px;}
  .lightbox{position:fixed;inset:0;background:rgba(13,42,92,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;}
  .lightbox img{max-width:90%;max-height:70vh;border-radius:8px;} .lb-close{position:absolute;top:20px;right:25px;color:white;font-size:40px;cursor:pointer;text-shadow:0 2px 10px rgba(0,0,0,0.8);}
  .lb-prev,.lb-next{position:absolute;top:50%;transform:translateY(-50%);color:white;font-size:45px;cursor:pointer;padding:15px;text-shadow:0 2px 10px rgba(0,0,0,0.8);}
  .lb-prev{left:5px;} .lb-next{right:5px;} .lb-actions button{margin-top:20px;background:var(--azul-500);color:white;border:none;padding:12px 24px;border-radius:10px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>
<div id="app"></div>
<div id="fatal" style="display:none;position:fixed;inset:0;background:#fdecea;color:#7a1f12;padding:24px;z-index:999;"></div>
<script>
window.onerror = function(m,u,l){document.getElementById('fatal').style.display='block';document.getElementById('fatal').innerText='Error fatal: '+m+' (linea '+l+')';return false;};
const SUPABASE_URL = "https://ofejunrkrjybfvbqmzzh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mZWp1bnJrcmp5YmZ2YnFtenpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MTYwNzQsImV4cCI6MjA5NzM5MjA3NH0.1Ir-tnr9AYdcu9cq8-l3ZxVkDafebGHlAyobs-MDnxE";
const sb = {
  async req(met, tab, id, body){
    let url = `${SUPABASE_URL}/rest/v1/${tab}` + (id ? `?id=eq.${id}` : '');
    let opt = { method:met, headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`} };
    if(body){ opt.headers['Content-Type']='application/json'; opt.headers['Prefer']='return=representation'; opt.body=JSON.stringify(body); }
    let res = await fetch(url, opt); if(!res.ok) return {error:await res.text()};
    return {data: met!=='DELETE'?await res.json():null, error:null};
  },
  select(tab,q={}){ let u=`${SUPABASE_URL}/rest/v1/${tab}?select=*`; if(q.o) u+=`&order=${q.o}.desc`; if(q.l) u+=`&limit=${q.l}`; return fetch(u,{headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}}).then(r=>r.json()); },
  upload(path,f){ return fetch(`${SUPABASE_URL}/storage/v1/object/fotos-tanques/${path}`,{method:'POST',headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':f.type},body:f}); },
  pubUrl(path){ return `${SUPABASE_URL}/storage/v1/object/public/fotos-tanques/${path}`; }
};
let state = { op:localStorage.getItem('tb_op'), tab:'nuevo', eId:null, exPh:[], q:'', edif:[], hist:[], load:false, ph:[], sug:false, err:null, subL:false, subM:null, lbImgs:[], lbIdx:0 };
function esc(s){return s?String(s).replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>').replace(/"/g,'"'):'';}
function num(n){return (n===null||n==='')?'-':Number(n).toLocaleString('es-AR');}
function tel(t){return esc(t).replace(/\b(\d{8,9})\b/g,'<a href="tel:$1" style="color:#1d4ed8;font-weight:bold;">$1</a>');}
function fec(i){if(!i)return'';let d=new Date(i);return d.toLocaleDateString('es-AR')+' '+d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});}

function render(){
  const app = document.getElementById('app');
  if(!state.op){
    app.innerHTML = `<div class="auth-wrap"><div class="auth-card"><img src="logo.png" class="logo-img-auth" onerror="this.style.display='none'"><h2>TECNO BOMBAS</h2><div class="tagline">SOLUCIONES SUPERIORES</div>${state.err?`<div class="auth-error">${state.err}</div>`:''}<form id="f-ing"><div class="field"><label>Nombre del operario</label><input type="text" id="i-nom" required autofocus></div><button class="btn-primary">Entrar</button></form></div></div>`;
    document.getElementById('f-ing').onsubmit = async(e)=>{ e.preventDefault(); state.op=document.getElementById('i-nom').value.trim(); localStorage.setItem('tb_op',state.op); await loadEd(); render(); };
  }else{
    app.innerHTML = `
      <div class="topbar"><img src="logo.png" class="logo-img-top" onerror="this.style.display='none'"><div><h1>TECNO BOMBAS</h1><div class="sub">SOLUCIONES SUPERIORES</div></div><div class="right"><span>${esc(state.op)}</span><button class="logout" onclick="localStorage.removeItem('tb_op');location.reload()">Salir</button></div></div>
      <div class="container"><div class="tabs"><button class="${state.tab==='nuevo'?'active':''}" onclick="state.tab='nuevo';render()">${state.eId?'✏️ Editando':'+ Nuevo'}</button><button class="${state.tab==='hist'?'active':''}" onclick="state.tab='hist';render();loadH()">Historial</button></div>
      ${state.tab==='nuevo'?rForm():rHist()}</div>
      ${state.lbImgs.length?`<div class="lightbox" id="lb" onclick="if(event.target.id==='lb'){state.lbImgs=[];render();}"><div class="lb-close" onclick="state.lbImgs=[];render()">×</div>${state.lbImgs.length>1?`<div class="lb-prev" onclick="event.stopPropagation();state.lbIdx=(state.lbIdx-1+state.lbImgs.length)%state.lbImgs.length;render()">❮</div><div class="lb-next" onclick="event.stopPropagation();state.lbIdx=(state.lbIdx+1)%state.lbImgs.length;render()">❯</div>`:''}<img src="${state.lbImgs[state.lbIdx]}"><div class="lb-actions"><button onclick="event.stopPropagation();window.open('${state.lbImgs[state.lbIdx]}','_blank')">⬇️ Ver Foto</button></div></div>`:''}
    `;
    if(state.tab==='nuevo') evForm(); else evHist();
  }
}

function rForm(){
  return `<div class="card"><h3>📍 Ubicación</h3><div class="field edif-suggestions"><label>Edificio</label><input type="text" id="f-nom" value="${esc(state.fNom)}" autocomplete="off"><div id="sug">${state.sug?rSug():''}</div></div><div class="dir-row"><div class="field"><label>Dirección</label><input type="text" id="f-dir" value="${esc(state.fDir)}"></div><button class="map-btn" onclick="window.open('https://maps.google.com/?q='+encodeURIComponent(document.getElementById('f-dir').value))">🗺️</button></div></div>
  <div class="card"><h3>💧 Tanques</h3><label style="font-size:12px;font-weight:bold;color:#0d2a5c;">Superiores</label><div class="row-niveles"><div class="field"><input type="number" id="f-cSup" placeholder="Cant." value="${state.cSup||''}"></div><div class="field"><input type="text" inputmode="numeric" id="f-lSup" placeholder="Litros (Ej: 12000)" value="${state.lSup||''}"></div></div><label style="font-size:12px;font-weight:bold;color:#0d2a5c;margin-top:10px;">Inferiores</label><div class="row-niveles"><div class="field"><input type="number" id="f-cInf" placeholder="Cant." value="${state.cInf||''}"></div><div class="field"><input type="text" inputmode="numeric" id="f-lInf" placeholder="Litros (Ej: 12000)" value="${state.lInf||''}"></div></div></div>
  <div class="card"><h3>📝 Detalles</h3><div class="field"><label>Observación (Teléfonos se pondrán azules al guardar)</label><textarea id="f-obs" rows="3">${esc(state.fObs)}</textarea></div><div class="field"><label>Fotos</label><div class="photo-input-area" onclick="document.getElementById('f-img').click()">📷 Tocar para agregar</div><input type="file" id="f-img" multiple accept="image/*" style="display:none" onchange="Array.from(this.files).forEach(f=>state.ph.push(f));render()"><div class="photo-previews">${state.exPh.map((u,i)=>`<div class="photo-thumb"><img src="${u}"><button class="remove" onclick="state.exPh.splice(${i},1);render()">×</button></div>`).join('')}${state.ph.map((f,i)=>`<div class="photo-thumb" style="border-color:green"><img src="${URL.createObjectURL(f)}"><button class="remove" onclick="state.ph.splice(${i},1);render()">×</button></div>`).join('')}</div></div></div>
  <button class="btn-primary" onclick="submit()" ${state.subL?'disabled':''}>${state.subL?'Guardando...':(state.eId?'Actualizar':'Guardar')}</button>${state.eId?`<button class="btn-cancelar" onclick="clearF()">Cancelar</button>`:''}${state.subM?`<div class="submit-msg ${state.subM.ok?'ok':'err'}">${state.subM.text}</div>`:''}`;
}

function rSug(){
  let q=(state.fNom||'').toLowerCase(); let m=state.edif.filter(e=>e.nombre.toLowerCase().includes(q)).slice(0,6);
  if(!m.length)return''; return `<div class="suggestion-list">${m.map(e=>`<div class="suggestion-item" onclick="state.fNom='${esc(e.nombre)}';state.fDir='${esc(e.direccion)}';state.sug=false;render()"><div>${esc(e.nombre)}</div><div class="s-dir">${esc(e.direccion)}</div></div>`).join('')}</div>`;
}

function rHist(){
  let h = `<div class="search-box"><span>🔍</span><input type="text" id="h-bus" placeholder="Buscar por edificio..." value="${esc(state.q)}"></div>`;
  if(state.load) return h+`<div class="loading">Cargando...</div>`;
  if(!state.hist.length) return h+`<div class="empty-state">No hay registros.</div>`;
  
  h += state.hist.map(i => {
    let match = !state.q || (i.nombre_edificio||'').toLowerCase().includes(state.q.toLowerCase());
    return `<div class="historial-item" data-s="${esc(i.nombre_edificio).toLowerCase()}" style="display:${match?'block':'none'}"><div class="h-top"><div><div class="h-edif">${esc(i.nombre_edificio)}</div><div class="h-dir" onclick="window.open('https://maps.google.com/?q='+encodeURIComponent('${esc(i.direccion)}'))">📍 ${esc(i.direccion)}</div></div><div class="h-fecha">${fec(i.created_at)}</div></div>
    <div class="h-litros"><div>Sup: <b>${i.cantidad_superior?i.cantidad_superior+' un. de ':''}${num(i.litros_superior)}L</b></div><div>Inf: <b>${i.cantidad_inferior?i.cantidad_inferior+' un. de ':''}${num(i.litros_inferior)}L</b></div></div>
    ${i.operario_nombre?`<div class="h-op">👤 ${esc(i.operario_nombre)}</div>`:''}${i.observacion?`<div class="h-obs">"${tel(i.observacion)}"</div>`:''}
    <div class="h-fotos">${(i.fotos||[]).map((u,idx)=>`<img src="${u}" onclick="state.lbImgs=state.hist.find(x=>x.id=='${i.id}').fotos;state.lbIdx=${idx};render()">`).join('')}</div>
    <div class="h-actions"><button class="btn-pdf" onclick="pdf('${i.id}')">📄 PDF</button><button class="btn-edit" onclick="edit('${i.id}')">✏️ Editar</button><button class="btn-delete" onclick="del('${i.id}')">🗑️ Borrar</button></div></div>`;
  }).join('');
  return h + `<div id="emp" class="empty-state" style="display:${(state.q&&!state.hist.some(x=>(x.nombre_edificio||'').toLowerCase().includes(state.q.toLowerCase())))?'block':'none'}">Sin resultados para la búsqueda.</div>`;
}

async function loadEd(){ let d=await sb.select('limpiezas_tanques',{o:'created_at',l:200}); let u=[], m=new Set(); for(let i of d){ if(i.nombre_edificio&&!m.has(i.nombre_edificio.toLowerCase())){m.add(i.nombre_edificio.toLowerCase());u.push({nombre:i.nombre_edificio,direccion:i.direccion});} } state.edif=u; }
async function loadH(){ state.load=true; render(); state.hist=await sb.select('limpiezas_tanques',{o:'created_at',l:100}); state.load=false; render(); }

function evForm(){
  document.getElementById('f-nom').oninput=(e)=>{state.fNom=e.target.value; state.sug=e.target.value.length>0; render(); setTimeout(()=>document.getElementById('f-nom').focus(),0);};
  document.getElementById('f-dir').oninput=(e)=>{state.fDir=e.target.value;};
  document.getElementById('f-cSup').oninput=(e)=>{state.cSup=e.target.value;}; document.getElementById('f-lSup').oninput=(e)=>{state.lSup=e.target.value;};
  document.getElementById('f-cInf').oninput=(e)=>{state.cInf=e.target.value;}; document.getElementById('f-lInf').oninput=(e)=>{state.lInf=e.target.value;};
  document.getElementById('f-obs').oninput=(e)=>{state.fObs=e.target.value;};
}

function evHist(){
  document.getElementById('h-bus').oninput=(e)=>{
    state.q=e.target.value; let vs=0, sq=state.q.toLowerCase();
    document.querySelectorAll('.historial-item').forEach(el=>{ if(el.dataset.s.includes(sq)){el.style.display='block';vs++;}else{el.style.display='none';} });
    document.getElementById('emp').style.display=vs===0?'block':'none';
  };
}

function clearF(){ state.eId=null; state.ph=[]; state.exPh=[]; state.fNom=''; state.fDir=''; state.lSup=''; state.lInf=''; state.cSup=''; state.cInf=''; state.fObs=''; state.subM=null; render(); }

window.edit = function(id){ let i=state.hist.find(x=>x.id===id); if(!i)return; state.eId=i.id; state.fNom=i.nombre_edificio; state.fDir=i.direccion; state.lSup=i.litros_superior; state.cSup=i.cantidad_superior; state.lInf=i.litros_inferior; state.cInf=i.cantidad_inferior; state.fObs=i.observacion; state.exPh=[...(i.fotos||[])]; state.ph=[]; state.tab='nuevo'; render(); };
window.del = async function(id){ if(prompt("Contraseña:")!=="1999"){alert("❌ Incorrecta");return;} if(!confirm('¿Borrar registro?'))return; state.load=true;render(); await sb.req('DELETE','limpiezas_tanques',id); await loadH(); };

window.pdf = function(id){
  let i=state.hist.find(x=>x.id===id); if(!i)return;
  let d=document.createElement('div'); d.style.padding='30px'; d.style.fontFamily='Arial';
  let fHtml = (i.fotos&&i.fotos.length)?`<h3 style="color:#1d4ed8;border-bottom:1px solid #ccc">Fotos</h3><div style="display:flex;gap:10px;flex-wrap:wrap">${i.fotos.map(u=>`<img src="${u}" crossorigin="anonymous" style="width:230px;height:230px;object-fit:cover;border-radius:8px">`).join('')}</div>`:'';
  d.innerHTML=`<div style="border-bottom:3px solid #1d4ed8;padding-bottom:15px;margin-bottom:25px;display:flex;justify-content:space-between"><div><h1 style="color:#1d4ed8;margin:0">TECNO BOMBAS</h1><p style="margin:0;font-size:12px">SOLUCIONES SUPERIORES</p></div><div style="text-align:right;font-size:12px"><b>Fecha:</b><br>${fec(i.created_at)}</div></div>
  <div style="background:#f3f8fd;padding:15px;border-radius:10px;margin-bottom:25px"><h2 style="margin:0 0 5px;color:#0d2a5c">${esc(i.nombre_edificio)}</h2><p style="margin:0">📍 ${esc(i.direccion)}</p></div>
  <table style="width:100%;border-collapse:collapse;margin-bottom:25px;font-size:14px"><tr><td style="padding:10px;border:1px solid #ccc;font-weight:bold;background:#fafafa;width:35%">Superiores</td><td style="padding:10px;border:1px solid #ccc">${i.cantidad_superior?i.cantidad_superior+' un. x ':''}${num(i.litros_superior)} L</td></tr><tr><td style="padding:10px;border:1px solid #ccc;font-weight:bold;background:#fafafa">Inferiores</td><td style="padding:10px;border:1px solid #ccc">${i.cantidad_inferior?i.cantidad_inferior+' un. x ':''}${num(i.litros_inferior)} L</td></tr><tr><td style="padding:10px;border:1px solid #ccc;font-weight:bold;background:#fafafa">Operario</td><td style="padding:10px;border:1px solid #ccc">👤 ${esc(i.operario_nombre)}</td></tr></table>
  <div style="margin-bottom:25px"><h3 style="color:#1d4ed8;border-bottom:1px solid #ccc">Observaciones</h3><p>${esc(i.observacion)||'Sin observaciones'}</p></div>${fHtml}`;
  html2pdf().set({margin:15,filename:`Reporte_${i.nombre_edificio.replace(/\s+/g,'_')}.pdf`,image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(d).save();
};

async function submit(){
  let pL = (v)=> { if(!v)return null; let n=parseInt(String(v).replace(/\./g,'').replace(/,/g,''),10); return isNaN(n)?null:n; };
  if(!state.fNom||!state.fDir){state.subM={ok:false,text:'Falta edificio o dirección'};render();return;}
  state.subL=true;state.subM=null;render();
  try{
    let nPh=[];
    for(let f of state.ph){ let x=f.name.split('.').pop()||'jpg'; let p=`${Date.now()}_${Math.random().toString(36).slice(2)}.${x}`; await sb.upload(p,f); nPh.push(sb.pubUrl(p)); }
    let pay = { direccion:state.fDir, nombre_edificio:state.fNom, cantidad_superior:parseInt(state.cSup,10)||null, litros_superior:pL(state.lSup), cantidad_inferior:parseInt(state.cInf,10)||null, litros_inferior:pL(state.lInf), operario_nombre:state.op, observacion:state.fObs||null, fotos:[...state.exPh,...nPh] };
    let {error} = await sb.req(state.eId?'PATCH':'POST', 'limpiezas_tanques', state.eId, pay);
    if(error) throw new Error(error);
    state.subL=false; state.subM={ok:true,text:'✓ Guardado'}; render(); setTimeout(()=>{clearF();loadEd();},1500);
  }catch(e){ state.subL=false; state.subM={ok:false,text:'Error: '+e.message}; render(); }
}

if(state.op) loadEd().then(render); else render();
</script>
</body>
</html>
